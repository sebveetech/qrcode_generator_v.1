<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern QR Code Generator by STV</title>

  <!-- Bootstrap 5 CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- QRCode library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      min-height: 100vh;
    }

    .qr-card {
      border: none;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .qr-header {
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      color: white;
      padding: 2rem;
    }

    .qr-preview {
      background: #fff;
      border: 2px dashed #dee2e6;
      border-radius: 20px;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 1.5rem;
    }

    canvas {
      max-width: 100%;
      height: auto;
    }

    .muted-note {
      font-size: 0.92rem;
      color: #6c757d;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-xl-7">
        <div class="card qr-card">
          <div class="qr-header text-center">
            <h1 class="h3 mb-2">QR Code Generator</h1>
            <p class="mb-0">Create clean, downloadable QR codes instantly</p>
          </div>

          <div class="card-body p-4 p-md-5">
            <div class="mb-4">
              <label for="qrText" class="form-label fw-semibold">Enter text or URL</label>
              <textarea
                id="qrText"
                class="form-control form-control-lg"
                rows="4"
                placeholder="https://example.com or any text..."
              ></textarea>
            </div>

            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label for="qrSize" class="form-label fw-semibold">QR Size</label>
                <select id="qrSize" class="form-select form-select-lg">
                  <option value="200">200 x 200</option>
                  <option value="250" selected>250 x 250</option>
                  <option value="300">300 x 300</option>
                  <option value="400">400 x 400</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="fileName" class="form-label fw-semibold">Download File Name</label>
                <input
                  type="text"
                  id="fileName"
                  class="form-control form-control-lg"
                  value="qrcode"
                  placeholder="qrcode"
                />
              </div>
            </div>

            <div class="d-grid d-md-flex gap-3 mb-4">
              <button class="btn btn-primary btn-lg px-4" onclick="generateQR()">
                Generate QR
              </button>
              <button class="btn btn-outline-secondary btn-lg px-4" onclick="clearQR()">
                Clear
              </button>
              <a id="downloadLink" class="btn btn-success btn-lg px-4 d-none" download="qrcode.png">
                Download PNG
              </a>
            </div>

            <div class="qr-preview" id="previewBox">
              <p class="text-muted mb-2">Your QR code will appear here</p>
              <canvas id="canvas" class="d-none"></canvas>
            </div>

            <div class="mt-4">
              <p class="muted-note mb-1">
                <strong>Validity note:</strong> QR codes do not normally expire.
              </p>
              <p class="muted-note mb-0">
                They remain usable as long as the stored content is correct and accessible. </br>
                <a href="https://wa.me/919447329978" class="floating-help"><i class="bi bi-chat-dots-fill">Developed by STV</i> </a>
              </p>
              
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function generateQR() {
      const text = document.getElementById("qrText").value.trim();
      const size = parseInt(document.getElementById("qrSize").value, 10);
      const fileName = document.getElementById("fileName").value.trim() || "qrcode";
      const canvas = document.getElementById("canvas");
      const downloadLink = document.getElementById("downloadLink");
      const previewBox = document.getElementById("previewBox");

      if (!text) {
        alert("Please enter text or URL");
        return;
      }

      QRCode.toCanvas(canvas, text, {
        width: size,
        margin: 2,
        errorCorrectionLevel: "H"
      }, function (error) {
        if (error) {
          console.error(error);
          alert("Failed to generate QR code");
          return;
        }

        canvas.classList.remove("d-none");
        previewBox.querySelectorAll("p").forEach(el => el.style.display = "none");

        downloadLink.href = canvas.toDataURL("image/png");
        downloadLink.download = fileName + ".png";
        downloadLink.classList.remove("d-none");
      });
    }

    function clearQR() {
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const downloadLink = document.getElementById("downloadLink");
      const previewBox = document.getElementById("previewBox");

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.classList.add("d-none");
      downloadLink.classList.add("d-none");

      previewBox.querySelectorAll("p").forEach(el => el.style.display = "block");
      document.getElementById("qrText").value = "";
    }
  </script>
</body>
</html>
